name: Tag after release-bump merge

# When a `release-bump`-labeled PR (opened by update-version.yml) merges to
# main, push `docs-v<version>`. That tag triggers release-docs.yml, which
# publishes the offline docs image + tarball matching the new docs pin.
#
# Version is extracted from the PR title set by update-version.yml:
#   "docs: update wasmCloud version to 2.1.0"
#
# workflow_dispatch is a manual escape hatch: pass a version explicitly to
# push a docs-v tag from main without going through the PR-bump flow. Useful
# when update-version.yml has failed to open the PR (e.g. WASMCLOUD_DOCS_BOT_PAT
# expired) and the offline docs pipeline needs to catch up.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g., 2.5.1). Pushes docs-v<version> from main HEAD."
        required: true
        type: string

permissions:
  contents: write

# Opt into Node 24 for bundled-JS actions ahead of GitHub's June 16, 2026 cutoff.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'release-bump'))
    runs-on: ubuntu-latest
    steps:
      - name: Verify bot PAT is available
        env:
          BOT_PAT: ${{ secrets.WASMCLOUD_DOCS_BOT_PAT }}
        run: |
          if [[ -z "${BOT_PAT}" ]]; then
            echo "::error::secrets.WASMCLOUD_DOCS_BOT_PAT is empty or unset."
            echo ""
            echo "This workflow needs a bot PAT with 'repo' scope to push the docs-v tag."
            echo "A tag pushed by the default GITHUB_TOKEN does NOT trigger downstream"
            echo "workflows, so the PAT is required to unblock release-docs.yml."
            echo ""
            echo "If the PAT can't be renewed right now, workflow_dispatch on release-docs.yml"
            echo "directly is the no-PAT escape hatch — it skips the tag push and creates the"
            echo "GitHub Release with GITHUB_TOKEN alone."
            echo ""
            echo "Rotate/renew the token at:"
            echo "    Repo → Settings → Secrets and variables → Actions → WASMCLOUD_DOCS_BOT_PAT"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          # Use bot PAT so the tag push triggers release-docs.yml. A tag pushed
          # by the default GITHUB_TOKEN does not fire downstream workflows.
          token: ${{ secrets.WASMCLOUD_DOCS_BOT_PAT }}

      - name: Extract version
        id: ver
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION}"
          else
            prefix='docs: update wasmCloud version to '
            if [[ "$PR_TITLE" != "${prefix}"* ]]; then
              echo "::error::PR title does not match expected prefix; got '$PR_TITLE'"
              exit 1
            fi
            version="${PR_TITLE#${prefix}}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::extracted version '$version' is not valid semver"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push docs-v${{ steps.ver.outputs.version }} tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          tag="docs-v${VERSION}"
          if git rev-parse --verify --quiet "refs/tags/${tag}"; then
            echo "::notice::tag ${tag} already exists; skipping"
            exit 0
          fi
          git tag -a "${tag}" -m "Offline docs release ${tag} (cuts ghcr.io/wasmcloud/docs:${VERSION})"
          git push origin "${tag}"
          echo "Pushed ${tag}; release-docs.yml will take over."
