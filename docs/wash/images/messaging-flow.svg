<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 520" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .box { rx: 8; ry: 8; }
    .label { font-size: 14px; fill: #1a1a2e; font-weight: 600; }
    .sublabel { font-size: 11px; fill: #6b7280; }
    .arrow { stroke: #9ca3af; stroke-width: 2; marker-end: url(#arrowhead); }
    .cmd { font-size: 11px; fill: #7c3aed; font-family: ui-monospace, monospace; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Box 1: HTTP request -->
  <rect class="box" x="120" y="20" width="300" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="label" x="270" y="42" text-anchor="middle">POST /task</text>
  <text class="sublabel" x="270" y="58" text-anchor="middle">{ worker, payload }</text>

  <!-- Arrow 1 (unlabeled — HTTP request arrives at http-api) -->
  <line class="arrow" x1="270" y1="70" x2="270" y2="116"/>

  <!-- Box 2: http-api component -->
  <rect class="box" x="120" y="120" width="300" height="50" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text class="label" x="270" y="142" text-anchor="middle">http-api</text>
  <text class="sublabel" x="270" y="158" text-anchor="middle">Wasm component</text>

  <!-- Arrow 2 -->
  <line class="arrow" x1="270" y1="170" x2="270" y2="236"/>
  <text class="cmd" x="282" y="205">consumer::request(subject, body, 5000ms)</text>

  <!-- Box 3: wasmCloud runtime -->
  <rect class="box" x="120" y="240" width="300" height="44" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
  <text class="label" x="270" y="266" text-anchor="middle">wasmCloud runtime</text>

  <!-- Arrow 3 -->
  <line class="arrow" x1="270" y1="284" x2="270" y2="346"/>
  <text class="sublabel" x="282" y="317">routes to task-worker handler</text>

  <!-- Box 4: task-worker component -->
  <rect class="box" x="120" y="350" width="300" height="50" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text class="label" x="270" y="372" text-anchor="middle">task-worker</text>
  <text class="sublabel" x="270" y="388" text-anchor="middle">Wasm component</text>

  <!-- Arrow 4 -->
  <line class="arrow" x1="270" y1="400" x2="270" y2="466"/>
  <text class="cmd" x="282" y="435">consumer::publish(replyTo, result)</text>

  <!-- Box 5: HTTP response -->
  <rect class="box" x="120" y="470" width="300" height="50" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text class="label" x="270" y="492" text-anchor="middle">HTTP Response</text>
  <text class="sublabel" x="270" y="508" text-anchor="middle">reply body returned by http-api</text>
</svg>
