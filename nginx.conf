server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docusaurus emits trailing-slash routes (trailingSlash: true). The
  # try_files fallback resolves /foo/, /foo, and bare /foo/index.html alike.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
